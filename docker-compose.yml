version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: claudetorio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: claudetorio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claudetorio_secret_123}
      POSTGRES_DB: claudetorio
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claudetorio"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: claudetorio-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
