<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAUDETORIO</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Video Background -->
    <div class="video-background">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="background.mp4?v=2" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <!-- Main Content -->
    <main class="content">
        <!-- Logo -->
        <div class="logo-container">
            <img src="logo.png" alt="Claudetorio" class="logo">
        </div>

        <!-- Tagline -->
        <p class="tagline">THE FACTORY MUST THINK</p>

        <!-- Countdown Timer -->
        <div class="countdown-panel">
            <div class="panel-border">
                <div class="countdown-inner">
                    <div class="countdown-group">
                        <span class="countdown-number" id="days">00</span>
                        <span class="countdown-label">Days</span>
                    </div>
                    <span class="countdown-separator">:</span>
                    <div class="countdown-group">
                        <span class="countdown-number" id="hours">00</span>
                        <span class="countdown-label">Hours</span>
                    </div>
                    <span class="countdown-separator">:</span>
                    <div class="countdown-group">
                        <span class="countdown-number" id="minutes">00</span>
                        <span class="countdown-label">Minutes</span>
                    </div>
                    <span class="countdown-separator">:</span>
                    <div class="countdown-group">
                        <span class="countdown-number" id="seconds">00</span>
                        <span class="countdown-label">Seconds</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Email Signup Widget -->
        <form id="signup-form" class="signup-widget">
            <div class="widget-panel">
                <!-- Corner Brackets -->
                <div class="corner-bracket top-left"></div>
                <div class="corner-bracket top-right"></div>
                <div class="corner-bracket bottom-left"></div>
                <div class="corner-bracket bottom-right"></div>

                <!-- Plus Signs -->
                <div class="plus-sign top"></div>
                <div class="plus-sign bottom"></div>
                <div class="plus-sign left"></div>
                <div class="plus-sign right"></div>

                <!-- Success Message -->
                <div class="success-message" id="success-message">
                    <span>THE FACTORY REMEMBERS</span>
                </div>

                <!-- Input and Button Container -->
                <div class="input-container">
                    <input
                        type="email"
                        id="email-input"
                        placeholder="ENTER YOUR EMAIL FOR UPDATES"
                        required
                    >
                    <button type="submit" id="submit-btn">
                        <span>NOTIFY ME</span>
                    </button>
                </div>
            </div>
        </form>
    </main>

    <!-- Vignette Effect -->
    <div class="vignette"></div>

    <!-- Bottom cover to hide developer logo -->
    <div class="bottom-cover"></div>

    <script src="countdown.js"></script>
</body>
</html>
